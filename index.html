<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnWordle</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Toast notification -->
  <div id="toast" aria-live="polite"></div>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">UnWordle</div>
      <p class="login-desc" data-i18n="login.desc">Guess the word in 6 tries.<br/>Sign in to save your statistics.</p>
      <button id="login-btn" class="btn-google">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.9 13.3l8 6.2C12.8 13.2 17.9 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.5-4.1 7-10.2 7-17.1z"/>
          <path fill="#FBBC05" d="M10.9 28.5A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.1.7-4.5l-8-6.2A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.4-6.3z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6 0-11.2-4-13-9.3l-8.4 6.3C6.6 42.5 14.7 48 24 48z"/>
        </svg>
        <span data-i18n="login.btn">Sign in with Google</span>
      </button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="hidden">
    <header>
      <div class="header-left">
        <button id="history-btn" data-i18n-title="header.history">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M13 3a9 9 0 0 0-9 9H1l3.9 3.9.1.2L9 12H6c0-3.9 3.1-7 7-7s7 3.1 7 7-3.1 7-7 7c-1.9 0-3.6-.7-4.9-1.9L6.7 18.4A8.96 8.96 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.3 2.5-.7 1.2L11 14V8h1z"/>
          </svg>
        </button>
      </div>
      <h1 id="title-home" style="cursor:pointer" title="Torna ad oggi">UnWordle</h1>
      <div class="header-right">
        <button id="stats-btn" data-i18n-title="header.stats">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zM4 11h4v8H4v-8zm16 8h-4v-6h4v6z"/>
          </svg>
        </button>
        <button id="logout-btn" data-i18n-title="header.logout">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M17 7l-1.4 1.4 2.6 2.6H9v2h9.2l-2.6 2.6L17 17l5-5-5-5zM5 5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h7v-2H5V5z"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <!-- Date navigation bar -->
      <div id="date-nav">
        <button id="nav-prev" title="Giorno precedente" aria-label="Giorno precedente">&#8592;</button>
        <div id="date-nav-info">
          <span id="date-nav-puzzle"></span>
          <span id="date-nav-date"></span>
        </div>
        <button id="nav-next" title="Giorno successivo" aria-label="Giorno successivo">&#8594;</button>
      </div>
      <div id="board-container">
        <div id="board"></div>
      </div>
      <div id="keyboard"></div>
    </main>
  </div>

  <!-- Stats Modal -->
  <div id="stats-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="stats-title">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Chiudi">✕</button>
      <h2 id="stats-title" data-i18n="stats.title">STATISTICS</h2>
      <div class="stats-grid">
        <div class="stat-item"><span id="stat-played">0</span><label data-i18n="stats.played">Played</label></div>
        <div class="stat-item"><span id="stat-winpct">0</span><label data-i18n="stats.winpct">Win %</label></div>
        <div class="stat-item"><span id="stat-streak">0</span><label data-i18n="stats.streak">Streak</label></div>
        <div class="stat-item"><span id="stat-maxstreak">0</span><label data-i18n="stats.maxstreak">Max Streak</label></div>
      </div>
      <h3 data-i18n="stats.distribution">GUESS DISTRIBUTION</h3>
      <div id="distribution"></div>
      <div class="modal-actions">
        <button id="share-btn" class="btn-share hidden" data-i18n="stats.share">Share 🔗</button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div id="history-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="history-title">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Chiudi">✕</button>
      <h2 id="history-title" data-i18n="history.title">GAME HISTORY</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Firebase SDK via CDN (compat mode — no npm required) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- App modules (order matters — dependencies first) -->
  <script src="js/firebase-config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/firestore.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
